spring:
  application:
    name: url-shortener
  datasource:
    url: jdbc:h2:file:./data/url-shortener;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

app:
  redirect-cache-size: 1000
